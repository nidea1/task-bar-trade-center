name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  windows-amd64:
    name: Windows AMD64
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          wails version

      - name: Prepare Windows icon
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/icon.ico")) {
              throw "Windows icon could not be found: assets/icon.ico"
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path "build/windows" |
            Out-Null

          Copy-Item `
            -Path "assets/icon.ico" `
            -Destination "build/windows/icon.ico" `
            -Force

      - name: Build Windows application
        shell: pwsh
        run: |
          wails build `
            -platform windows/amd64 `
            -trimpath `
            -o tbtc.exe

      - name: Test
        shell: pwsh
        run: go test ./...

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $sourceExecutable = "build/bin/tbtc.exe"
          $targetExecutable = "dist/tbtc.exe"

          if (-not (Test-Path $sourceExecutable)) {
              throw "Wails executable could not be found: $sourceExecutable"
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path "dist" |
            Out-Null

          Copy-Item `
            -Path $sourceExecutable `
            -Destination $targetExecutable `
            -Force

          $hash = Get-FileHash `
            -Path $targetExecutable `
            -Algorithm SHA256

          "$($hash.Hash.ToLowerInvariant())  tbtc.exe" |
            Set-Content `
              -Path "dist/checksums.txt" `
              -Encoding ascii

          Write-Host "Release artifacts:"
          Get-ChildItem "dist" -File |
            Format-Table Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tbtc-windows-amd64
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v")
          $escapedVersion = [regex]::Escape($version)
          $lines = Get-Content "CHANGELOG.md"
          $inSection = $false
          $result = [System.Collections.Generic.List[string]]::new()

          foreach ($line in $lines) {
              if ($line -match "^##\s*\[?v?${escapedVersion}\]?") {
                  $inSection = $true
                  continue
              }

              if ($inSection) {
                  if ($line -match "^##\s+") {
                      break
                  }

                  $result.Add($line)
              }
          }

          $notes = ($result -join "`r`n").Trim()

          if ($notes) {
              $notes |
                Set-Content `
                  -Path "release_notes.txt" `
                  -Encoding utf8
          }
          else {
              "No release notes found in CHANGELOG.md for version $version" |
                Set-Content `
                  -Path "release_notes.txt" `
                  -Encoding utf8
          }

          gh release view "$env:GITHUB_REF_NAME" *> $null

          if ($LASTEXITCODE -eq 0) {
              Write-Host "Existing release found. Deleting it..."
              gh release delete "$env:GITHUB_REF_NAME" --yes

              if ($LASTEXITCODE -ne 0) {
                  throw "Existing GitHub release could not be deleted."
              }
          }

          $assets = Get-ChildItem "dist" -File |
            ForEach-Object { $_.FullName }

          if ($assets.Count -eq 0) {
              throw "No release assets were found in the dist directory."
          }

          gh release create "$env:GITHUB_REF_NAME" `
            @assets `
            --verify-tag `
            --title "$env:GITHUB_REF_NAME" `
            --notes-file "release_notes.txt"

          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release could not be created."
          }